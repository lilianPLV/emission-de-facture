<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="left">
    <div class="brand">
      <span class="brand-name">Ouvrir ses ailes</span>
      <p class="brand-note">Une interface simple et rapide pour l'emission de facture.</p>
    </div>
  </div>

  <div class="right">
    <div class="form-wrap">
      <h1>Connexion</h1>
      <p class="sub">Accédez à votre espace de travail.</p>

      <form id="form" novalidate>

        <div class="field">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email">
          <p class="err-msg" id="emailErr">Entrez une adresse e-mail valide.</p>
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <div class="pwd-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Afficher le mot de passe">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="err-msg" id="pwdErr">Minimum 6 caractères.</p>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span class="label">Se connecter</span>
          <span class="spinner"></span>
        </button>

      </form>
    </div>
  </div>

  <script type="module" src="auth.js"> </script>

</body>
</html>
